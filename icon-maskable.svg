<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Full bleed background for maskable safe zone -->
  <rect width="192" height="192" fill="#0d1117"/>
  <!-- Candlestick wicks (inset for maskable safe zone ~40px) -->
  <line x1="54"  y1="58"  x2="54"  y2="134" stroke="#26a69a" stroke-width="5" stroke-linecap="round"/>
  <line x1="96"  y1="48"  x2="96"  y2="144" stroke="#ef5350" stroke-width="5" stroke-linecap="round"/>
  <line x1="138" y1="54"  x2="138" y2="132" stroke="#26a69a" stroke-width="5" stroke-linecap="round"/>
  <!-- Candle bodies -->
  <rect x="44"  y="76"  width="20" height="38" rx="2" fill="#26a69a"/>
  <rect x="86"  y="68"  width="20" height="44" rx="2" fill="#ef5350"/>
  <rect x="128" y="74"  width="20" height="34" rx="2" fill="#26a69a"/>
  <!-- Trend line -->
  <polyline points="54,128 96,96 138,78"
            fill="none" stroke="#58a6ff" stroke-width="3"
            stroke-linecap="round" stroke-linejoin="round"
            stroke-dasharray="5 4"/>
</svg>
