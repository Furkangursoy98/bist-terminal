<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <rect width="192" height="192" rx="28" fill="#0d1117"/>
  <!-- Candlestick wicks -->
  <line x1="44"  y1="48"  x2="44"  y2="144" stroke="#26a69a" stroke-width="5" stroke-linecap="round"/>
  <line x1="96"  y1="36"  x2="96"  y2="152" stroke="#ef5350" stroke-width="5" stroke-linecap="round"/>
  <line x1="148" y1="44"  x2="148" y2="140" stroke="#26a69a" stroke-width="5" stroke-linecap="round"/>
  <!-- Candle bodies -->
  <rect x="32"  y="68"  width="24" height="48" rx="3" fill="#26a69a"/>
  <rect x="84"  y="58"  width="24" height="54" rx="3" fill="#ef5350"/>
  <rect x="136" y="66"  width="24" height="42" rx="3" fill="#26a69a"/>
  <!-- Trend line -->
  <polyline points="44,140 96,100 148,80"
            fill="none" stroke="#58a6ff" stroke-width="3"
            stroke-linecap="round" stroke-linejoin="round"
            stroke-dasharray="6 4"/>
</svg>
